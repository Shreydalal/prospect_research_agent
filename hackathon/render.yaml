services:
  - type: web
    name: prospect-research-agent
    env: python
    rootDir: hackathon
    buildCommand: python -m pip install -r requirements.txt && cd frontend && npm install && npm run build
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
